name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Frontend and Backend
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install Root dependencies
      run: npm install

    - name: Install Frontend dependencies
      working-directory: ./frontend
      run: npm install

    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build

    - name: Install Backend dependencies
      working-directory: ./backend
      run: npm install

    - name: Check Backend Build (Lint/Check)
      working-directory: ./backend
      run: |
        if [ -f "package.json" ]; then
          # Simply check if it's valid if there's no build script
          ls -R
        fi
